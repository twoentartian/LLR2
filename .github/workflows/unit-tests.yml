name: Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONPATH: ${{ github.workspace }}
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install lightning timm transformers faiss-cpu pillow numpy pyyaml mod blobfile
          python -m pip install accelerate einops ema-pytorch packaging pytorch-fid scipy tqdm

      - name: Run unit tests
        run: |
          python -m unittest test.test_engine test.test_generate_high_accuracy_model test.test_find_high_accuracy_path_resume -v
