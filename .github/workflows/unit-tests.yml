name: Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      PYTHONPATH: ${{ github.workspace }}
      OMP_NUM_THREADS: "2"
      MKL_NUM_THREADS: "2"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          python -m pip install lightning timm transformers faiss-cpu pillow numpy pyyaml

      - name: Run unit tests
        run: |
          python -m unittest test.test_engine test.test_generate_high_accuracy_model -v
